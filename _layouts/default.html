<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="keywords" content="{{ page.keywords | default: site.keywords }}">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <h1 class="logo">{{ site.title }}</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="#hero">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="/portfolio-website/projects/">Projects</a></li>
          <li><a href="/portfolio-website/certifications/">Certifications</a></li>
          <li><a href="/portfolio-website/blog/">Blog</a></li>
          <li><a href="/portfolio-website/contact/">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.author }}. All Rights Reserved.</p>
  </footer>

  <!-- JavaScript -->
  <script src="{{ '/assets/js/scripts.js' | relative_url }}"></script>
</body>
</html>
